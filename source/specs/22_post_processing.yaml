  # === COLOR EFFECTS ===
  - name: CREATECOLOREFFECT
    raylib_name: CreateColorEffect
    args: [int, int, int, int]
    ret: int
    category: post_processing
    description: "Create color effect (brightness, contrast, saturation, hue)"
    working: true
    custom_body: |
      // Create color effect
      int brightness = INT(0);
      int contrast = INT(1);
      int saturation = INT(2);
      int hue = INT(3);
      // Use average intensity for registry
      int avg_intensity = (brightness + contrast + saturation + hue) / 4;
      return Value::from_int(postfx_registry::create_effect("color", "color", avg_intensity));

