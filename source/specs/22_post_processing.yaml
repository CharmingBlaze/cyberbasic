# Post-Processing Effects
# Easy-to-use post-processing effects for game developers
# Following best practices: simple, powerful visual effects

functions:
  # === POST-PROCESSING SETUP ===
  - name: CREATEPOSTEFFECT
    raylib_name: CreatePostEffect
    args: [string, int]
    ret: int
    category: post_processing
    description: "Create post-processing effect (name, intensity)"
    working: true
    custom_body: |
      // Create post-processing effect using registry
      std::string name = STR(0);
      int intensity = INT(1);
      return Value::from_int(postfx_registry::create_effect(name, "generic", intensity));

  - name: DESTROYPOSTEFFECT
    raylib_name: DestroyPostEffect
    args: [int]
    ret: void
    category: post_processing
    description: "Destroy post-processing effect (effectID)"
    working: true
    custom_body: |
      // Destroy post-processing effect
      postfx_registry::destroy_effect(INT(0));
      return Value::nil();

  - name: ENABLEPOSTEFFECT
    raylib_name: EnablePostEffect
    args: [int]
    ret: void
    category: post_processing
    description: "Enable post-processing effect (effectID)"
    working: true
    custom_body: |
      // Enable post-processing effect
      postfx_registry::enable_effect(INT(0), true);
      return Value::nil();

  - name: DISABLEPOSTEFFECT
    raylib_name: DisablePostEffect
    args: [int]
    ret: void
    category: post_processing
    description: "Disable post-processing effect (effectID)"
    working: true
    custom_body: |
      // Disable post-processing effect
      postfx_registry::enable_effect(INT(0), false);
      return Value::nil();

