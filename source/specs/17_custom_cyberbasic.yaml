  # === UTILITY FUNCTIONS ===
  - name: RANDOMINT
    raylib_name: RandomInt
    args: [int, int]
    ret: int
    category: custom_cyberbasic
    description: "Get random integer between min and max (min, max)"
    working: true
    custom_body: |
      // Use raylib's GetRandomValue
      return Value::from_int(::GetRandomValue(INT(0), INT(1)));

  - name: RANDOMFLOAT
    raylib_name: RandomFloat
    args: [float, float]
    ret: float
    category: custom_cyberbasic
    description: "Get random float between min and max (min, max)"
    working: true
    custom_body: |
      float min = static_cast<float>(FLOAT(0));
      float max = static_cast<float>(FLOAT(1));
      float range = max - min;
      return Value::from_number(static_cast<double>(min + ::GetRandomValue(0, 10000) / 10000.0f * range));

  - name: DISTANCE
    raylib_name: Distance
    args: [int, int, int, int]
    ret: float
    category: custom_cyberbasic
    description: "Calculate distance between two points (x1, y1, x2, y2)"
    working: true
    custom_body: |
      float x1 = static_cast<float>(INT(0));
      float y1 = static_cast<float>(INT(1));
      float x2 = static_cast<float>(INT(2));
      float y2 = static_cast<float>(INT(3));
      float dx = x2 - x1;
      float dy = y2 - y1;
      return Value::from_number(static_cast<double>(sqrtf(dx * dx + dy * dy)));

  - name: ANGLE
    raylib_name: Angle
    args: [int, int, int, int]
    ret: float
    category: custom_cyberbasic
    description: "Calculate angle between two points (x1, y1, x2, y2)"
    working: true
    custom_body: |
      float x1 = static_cast<float>(INT(0));
      float y1 = static_cast<float>(INT(1));
      float x2 = static_cast<float>(INT(2));
      float y2 = static_cast<float>(INT(3));
      float dx = x2 - x1;
      float dy = y2 - y1;
      return Value::from_number(static_cast<double>(atan2f(dy, dx)));

  - name: LERP
    raylib_name: Lerp
    args: [float, float, float]
    ret: float
    category: custom_cyberbasic
    description: "Linear interpolation between a and b by t (a, b, t)"
    working: true
    custom_body: |
      float a = static_cast<float>(FLOAT(0));
      float b = static_cast<float>(FLOAT(1));
      float t = static_cast<float>(FLOAT(2));
      return Value::from_number(static_cast<double>(a + t * (b - a)));

  - name: CLAMP
    raylib_name: Clamp
    args: [float, float, float]
    ret: float
    category: custom_cyberbasic
    description: "Clamp value between min and max (value, min, max)"
    working: true
    custom_body: |
      float value = static_cast<float>(FLOAT(0));
      float min_val = static_cast<float>(FLOAT(1));
      float max_val = static_cast<float>(FLOAT(2));
      if (value < min_val) value = min_val;
      if (value > max_val) value = max_val;
      return Value::from_number(static_cast<double>(value));
