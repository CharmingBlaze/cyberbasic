  # === TEXT SYSTEM ===
  - name: DRAWTEXTEX
    raylib_name: DrawTextEx
    args: [string, int, int, int, int, int, int, int]
    ret: void
    category: custom_cyberbasic
    description: "Draw text with extended options (text, x, y, font size, spacing, R, G, B)"
    working: true
    custom_body: |
      ::bas::DrawTextEx(STR(0).c_str(), INT(1), INT(2), INT(3), INT(4), ::Color{(unsigned char)INT(5), (unsigned char)INT(6), (unsigned char)INT(7), 255});
      return Value::nil();

