    category: custom_cyberbasic
    description: "Get sprite Y position (sprite ID)"
    working: true
    custom_body: |
      return Value::from_int(::bas::GetSpriteY(INT(0)));

  - name: SETSPRITESPEED
    raylib_name: SetSpriteSpeed
    args: [int, float]
    ret: void
    category: custom_cyberbasic
    description: "Set sprite movement speed (sprite ID, speed)"
    working: true
    custom_body: |
      ::bas::SetSpriteSpeed(INT(0), static_cast<float>(FLOAT(1)));
      return Value::nil();

  - name: GETSPRITESPEED
    raylib_name: GetSpriteSpeed
    args: [int]
