# Core Extended Functions
# Module: rcore - Additional window, camera, VR, shader, automation, and utility functions
# This file contains extended core functionality including window management,
# screen-space operations, VR support, shader utilities, automation, and callbacks

functions:
  # === WINDOW FUNCTIONS ===
  - name: SETWINDOWSIZE
    raylib_name: SetWindowSize
    args: [int, int]
    ret: void
    category: window
    description: "Set window dimensions"
  
  - name: SETWINDOWICONS
    raylib_name: SetWindowIcons
    args: [string, int]
    ret: void
    category: window
    description: "Set icon for window (loads image from path and sets as window icon)"
    custom_body: |
      // Load image from path and set as window icon
      // For multiple icons, call SetWindowIcon multiple times
      ::Image icon = ::LoadImage(STR(0).c_str());
      if (::IsImageValid(icon)) {
        ::SetWindowIcon(icon);
        ::UnloadImage(icon);
      }
  
  - name: GETWINDOWPOSITION
    raylib_name: GetWindowPosition
    args: []
    ret: string
    category: window
    description: "Get window position XY on monitor"
    custom_body: |
      ::Vector2 pos = ::GetWindowPosition();
      return Value::from_string(std::to_string(pos.x) + "," + std::to_string(pos.y));
  
  - name: GETWINDOWSCALEDPI
    raylib_name: GetWindowScaleDPI
    args: []
    ret: string
    category: window
    description: "Get window scale DPI factor"
    custom_body: |
      ::Vector2 scale = ::GetWindowScaleDPI();
      return Value::from_string(std::to_string(scale.x) + "," + std::to_string(scale.y));
  
  - name: GETCLIPBOARDIMAGE
    raylib_name: GetClipboardImage
    args: []
    ret: int
    category: window
    description: "Get clipboard image"
    custom_body: |
      ::Image img = ::GetClipboardImage();
      int id = rlreg::next_image_id++;
      rlreg::images[id] = img;
      return Value::from_int(id);
  
  # === FRAME CONTROL ===
  - name: SWAPSCREENBUFFER
    raylib_name: SwapScreenBuffer
    args: []
    ret: void
    category: window
    description: "Swap back buffer with front buffer (screen drawing)"
  
  - name: POLLINPUTEVENTS
    raylib_name: PollInputEvents
    args: []
    ret: void
    category: window
    description: "Register all input events"
  
  - name: WAITTIME
    raylib_name: WaitTime
    args: [double]
    ret: void
    category: window
    description: "Wait for some time (halt program execution)"
  
  # === RANDOM FUNCTIONS ===
  - name: LOADRANDOMSEQUENCE
    raylib_name: LoadRandomSequence
    args: [int, int, int]
    ret: string
    category: utility
    description: "Load random values sequence"
    custom_body: |
      int* seq = ::LoadRandomSequence(INT(0), INT(1), INT(2));
      (void)seq; // Suppress unused variable warning
      // Random sequence is managed internally by raylib
      return Value::from_string("sequence_loaded");
  
  - name: UNLOADRANDOMSEQUENCE
    raylib_name: UnloadRandomSequence
    args: [string]
    ret: void
    category: utility
    description: "Unload random values sequence"
    custom_body: |
      // Note: Sequence is managed internally by raylib, no action needed
      (void)STR(0); // Suppress unused parameter warning
  
  # === SCREEN-SPACE FUNCTIONS ===
  - name: GETSCREENTOWORLDRAYEX
    raylib_name: GetScreenToWorldRayEx
    args: [float, float, int, int, int]
    ret: string
    category: camera
    description: "Get ray trace from screen position in viewport"
    custom_body: |
      ::Vector2 mousePos{(float)FLOAT(0), (float)FLOAT(1)};
      ::Camera3D camera;
      camera.position = {(float)0.0f, (float)0.0f, (float)0.0f};
      camera.target = {(float)0.0f, (float)0.0f, (float)1.0f};
      camera.up = {(float)0.0f, (float)1.0f, (float)0.0f};
      camera.fovy = 60.0f;
      camera.projection = INT(2);
      ::Ray ray = ::GetScreenToWorldRayEx(mousePos, camera, INT(3), INT(4));
      return Value::from_string(std::to_string(ray.position.x) + "," + std::to_string(ray.position.y) + "," + std::to_string(ray.position.z) + "," + std::to_string(ray.direction.x) + "," + std::to_string(ray.direction.y) + "," + std::to_string(ray.direction.z));
  
  - name: GETWORLDTOSCREENEX
    raylib_name: GetWorldToScreenEx
    args: [float, float, float, int, int, int]
    ret: string
    category: camera
    description: "Get screen position for 3d world space position in viewport"
    custom_body: |
      ::Vector3 worldPos{(float)FLOAT(0), (float)FLOAT(1), (float)FLOAT(2)};
      ::Camera3D camera;
      camera.position = {(float)0.0f, (float)0.0f, (float)0.0f};
      camera.target = {(float)0.0f, (float)0.0f, (float)1.0f};
      camera.up = {(float)0.0f, (float)1.0f, (float)0.0f};
      camera.fovy = 60.0f;
      camera.projection = INT(3);
      ::Vector2 screenPos = ::GetWorldToScreenEx(worldPos, camera, INT(4), INT(5));
      return Value::from_string(std::to_string(screenPos.x) + "," + std::to_string(screenPos.y));
  
  - name: GETWORLDTOSCREEN2D
    raylib_name: GetWorldToScreen2D
    args: [float, float, int]
    ret: string
    category: camera
    description: "Get screen position for 2d camera world space position"
    custom_body: |
      ::Vector2 worldPos{(float)FLOAT(0), (float)FLOAT(1)};
      ::Camera2D camera;
      camera.target = {(float)0.0f, (float)0.0f};
      camera.offset = {(float)0.0f, (float)0.0f};
      camera.rotation = 0.0f;
      camera.zoom = 1.0f;
      ::Vector2 screenPos = ::GetWorldToScreen2D(worldPos, camera);
      return Value::from_string(std::to_string(screenPos.x) + "," + std::to_string(screenPos.y));
  
  - name: GETSCREENTOWORLD2D
    raylib_name: GetScreenToWorld2D
    args: [float, float, int]
    ret: string
    category: camera
    description: "Get world position for 2d camera screen space position"
    custom_body: |
      ::Vector2 screenPos{(float)FLOAT(0), (float)FLOAT(1)};
      ::Camera2D camera;
      camera.target = {(float)0.0f, (float)0.0f};
      camera.offset = {(float)0.0f, (float)0.0f};
      camera.rotation = 0.0f;
      camera.zoom = 1.0f;
      ::Vector2 worldPos = ::GetScreenToWorld2D(screenPos, camera);
      return Value::from_string(std::to_string(worldPos.x) + "," + std::to_string(worldPos.y));
  
  - name: GETCAMERAMATRIX
    raylib_name: GetCameraMatrix
    args: [int]
    ret: string
    category: camera
    description: "Get camera transform matrix (view matrix)"
    custom_body: |
      ::Camera3D camera;
      camera.position = {(float)0.0f, (float)0.0f, (float)0.0f};
      camera.target = {(float)0.0f, (float)0.0f, (float)1.0f};
      camera.up = {(float)0.0f, (float)1.0f, (float)0.0f};
      camera.fovy = 60.0f;
      camera.projection = CAMERA_PERSPECTIVE;
      ::Matrix matrix = ::GetCameraMatrix(camera);
      return Value::from_string(std::to_string(matrix.m0) + "," + std::to_string(matrix.m1) + "," + std::to_string(matrix.m2) + "," + std::to_string(matrix.m3) + "," + std::to_string(matrix.m4) + "," + std::to_string(matrix.m5) + "," + std::to_string(matrix.m6) + "," + std::to_string(matrix.m7) + "," + std::to_string(matrix.m8) + "," + std::to_string(matrix.m9) + "," + std::to_string(matrix.m10) + "," + std::to_string(matrix.m11) + "," + std::to_string(matrix.m12) + "," + std::to_string(matrix.m13) + "," + std::to_string(matrix.m14) + "," + std::to_string(matrix.m15));
  
  - name: GETCAMERAMATRIX2D
    raylib_name: GetCameraMatrix2D
    args: [int]
    ret: string
    category: camera
    description: "Get camera 2d transform matrix"
    custom_body: |
      ::Camera2D camera;
      camera.target = {(float)0.0f, (float)0.0f};
      camera.offset = {(float)0.0f, (float)0.0f};
      camera.rotation = 0.0f;
      camera.zoom = 1.0f;
      ::Matrix matrix = ::GetCameraMatrix2D(camera);
      return Value::from_string(std::to_string(matrix.m0) + "," + std::to_string(matrix.m1) + "," + std::to_string(matrix.m2) + "," + std::to_string(matrix.m3) + "," + std::to_string(matrix.m4) + "," + std::to_string(matrix.m5) + "," + std::to_string(matrix.m6) + "," + std::to_string(matrix.m7) + "," + std::to_string(matrix.m8) + "," + std::to_string(matrix.m9) + "," + std::to_string(matrix.m10) + "," + std::to_string(matrix.m11) + "," + std::to_string(matrix.m12) + "," + std::to_string(matrix.m13) + "," + std::to_string(matrix.m14) + "," + std::to_string(matrix.m15));
  
  # === VR FUNCTIONS ===
  - name: LOADVRSTEREOCONFIG
    raylib_name: LoadVrStereoConfig
    args: [int]
    ret: int
    category: vr
    description: "Load VR stereo config for VR simulator device parameters"
    custom_body: |
      ::VrDeviceInfo device = {2160, 1200, 0.110f, 0.062f, 0.041f, 0.07f, 0.064f, {1.0f, 0.22f, 0.24f, 0.0f}, {0.996f, -0.004f, 1.014f, 0.0f}};
      ::VrStereoConfig config = ::LoadVrStereoConfig(device);
      static int next_vr_id = 1;
      // Note: VR config is managed internally, return ID for tracking
      return Value::from_int(next_vr_id++);
  
  - name: UNLOADVRSTEREOCONFIG
    raylib_name: UnloadVrStereoConfig
    args: [int]
    ret: void
    category: vr
    description: "Unload VR stereo config"
    custom_body: |
      // Note: VR config is managed internally by raylib
      (void)INT(0); // Suppress unused parameter warning
  
  - name: BEGINVRSTEREOMODE
    raylib_name: BeginVrStereoMode
    args: [int]
    ret: void
    category: vr
    description: "Begin stereo rendering (requires VR simulator)"
    custom_body: |
      ::VrDeviceInfo device = {2160, 1200, 0.110f, 0.062f, 0.041f, 0.07f, 0.064f, {1.0f, 0.22f, 0.24f, 0.0f}, {0.996f, -0.004f, 1.014f, 0.0f}};
      ::VrStereoConfig config = ::LoadVrStereoConfig(device);
      ::BeginVrStereoMode(config);
  
  - name: ENDVRSTEREOMODE
    raylib_name: EndVrStereoMode
    args: []
    ret: void
    category: vr
    description: "End stereo rendering (requires VR simulator)"
  
  # === SHADER FUNCTIONS ===
  - name: ISSHADERVALID
    raylib_name: IsShaderValid
    args: [int]
    ret: bool
    category: shader
    description: "Check if shader is valid (loaded on GPU)"
    custom_body: |
      if (rlreg::shaders.find(INT(0)) == rlreg::shaders.end()) {
        return Value::from_bool(false);
      }
      return Value::from_bool(::IsShaderValid(rlreg::shaders.at(INT(0))));
  
  - name: GETSHADERLOCATIONATTRIB
    raylib_name: GetShaderLocationAttrib
    args: [int, string]
    ret: int
    category: shader
    description: "Get shader attribute location"
    custom_body: |
      if (rlreg::shaders.find(INT(0)) == rlreg::shaders.end()) {
        return Value::from_int(-1);
      }
      return Value::from_int(::GetShaderLocationAttrib(rlreg::shaders.at(INT(0)), STR(1).c_str()));
  
  - name: SETSHADERVALUEV
    raylib_name: SetShaderValueV
    args: [int, int, string, int, int]
    ret: void
    category: shader
    description: "Set shader uniform value vector"
    custom_body: |
      // Parse 4-component vector from string "x,y,z,w"
      std::string vecStr = STR(2);
      size_t pos1 = vecStr.find(',');
      size_t pos2 = vecStr.find(',', pos1 + 1);
      size_t pos3 = vecStr.find(',', pos2 + 1);
      if (pos1 != std::string::npos && pos2 != std::string::npos && pos3 != std::string::npos) {
        float values[4] = {
          std::stof(vecStr.substr(0, pos1)),
          std::stof(vecStr.substr(pos1 + 1, pos2 - pos1 - 1)),
          std::stof(vecStr.substr(pos2 + 1, pos3 - pos2 - 1)),
          std::stof(vecStr.substr(pos3 + 1))
        };
        if (rlreg::shaders.find(INT(0)) != rlreg::shaders.end()) {
          ::SetShaderValueV(rlreg::shaders.at(INT(0)), INT(1), values, SHADER_UNIFORM_VEC4, INT(4));
        }
      }
  
  - name: SETSHADERVALUEMATRIX
    raylib_name: SetShaderValueMatrix
    args: [int, int, string]
    ret: void
    category: shader
    description: "Set shader uniform value (matrix 4x4)"
    custom_body: |
      // Parse 4x4 matrix from string "m0,m1,m2,...,m15"
      std::string matStr = STR(2);
      ::Matrix matrix = {0};
      size_t start = 0;
      size_t pos = 0;
      int idx = 0;
      float* matData = &matrix.m0;
      while ((pos = matStr.find(',', start)) != std::string::npos && idx < 16) {
        matData[idx++] = std::stof(matStr.substr(start, pos - start));
        start = pos + 1;
      }
      if (idx < 16 && start < matStr.length()) {
        matData[idx] = std::stof(matStr.substr(start));
      }
      if (rlreg::shaders.find(INT(0)) != rlreg::shaders.end()) {
        ::SetShaderValueMatrix(rlreg::shaders.at(INT(0)), INT(1), matrix);
      }
  
  - name: SETSHADERVALUETEXTURE
    raylib_name: SetShaderValueTexture
    args: [int, int, int]
    ret: void
    category: shader
    description: "Set shader uniform value for texture (sampler2d)"
    custom_body: |
      if (rlreg::shaders.find(INT(0)) != rlreg::shaders.end() && rlreg::textures.find(INT(2)) != rlreg::textures.end()) {
        ::SetShaderValueTexture(rlreg::shaders.at(INT(0)), INT(1), rlreg::textures.at(INT(2)));
      }
  
  # === FILE SYSTEM FUNCTIONS ===
  - name: MAKEDIRECTORY
    raylib_name: MakeDirectory
    args: [string]
    ret: int
    category: file
    description: "Create directories (including full path requested), returns 0 on success"
  
  - name: ISFILENAMEVALID
    raylib_name: IsFileNameValid
    args: [string]
    ret: bool
    category: file
    description: "Check if fileName is valid for the platform/OS"
  
  - name: DECODEDATABASE64
    raylib_name: DecodeDataBase64
    args: [string]
    ret: string
    category: file
    description: "Decode Base64 string data"
    custom_body: |
      int outputSize;
      unsigned char* data = ::DecodeDataBase64((const unsigned char*)STR(0).c_str(), &outputSize);
      std::string result((char*)data, outputSize);
      ::MemFree(data);
      return Value::from_string(result);
  
  - name: COMPUTECRC32
    raylib_name: ComputeCRC32
    args: [string]
    ret: int
    category: file
    description: "Compute CRC32 hash code"
    custom_body: |
      return Value::from_int(::ComputeCRC32((unsigned char*)STR(0).c_str(), STR(0).length()));
  
  - name: COMPUTEMD5
    raylib_name: ComputeMD5
    args: [string]
    ret: string
    category: file
    description: "Compute MD5 hash code"
    custom_body: |
      unsigned int* hash = ::ComputeMD5((unsigned char*)STR(0).c_str(), STR(0).length());
      std::string result = std::to_string(hash[0]) + "," + std::to_string(hash[1]) + "," + std::to_string(hash[2]) + "," + std::to_string(hash[3]);
      return Value::from_string(result);
  
  - name: COMPUTESHA1
    raylib_name: ComputeSHA1
    args: [string]
    ret: string
    category: file
    description: "Compute SHA1 hash code"
    custom_body: |
      unsigned int* hash = ::ComputeSHA1((unsigned char*)STR(0).c_str(), STR(0).length());
      std::string result = std::to_string(hash[0]) + "," + std::to_string(hash[1]) + "," + std::to_string(hash[2]) + "," + std::to_string(hash[3]) + "," + std::to_string(hash[4]);
      return Value::from_string(result);
  
