# Missing Text/Fonts Functions from API.MD
# Module: rtext - Additional text and font functions

functions:
  # === FONT FUNCTIONS ===
  - name: LOADFONTFROMIMAGE
    raylib_name: LoadFontFromImage
    args: [int, int, int, int, int]
    ret: font
    category: fonts
    description: "Load font from Image (XNA style) (pass image ID, R, G, B for key, firstChar)"
    custom_body: |
      ::Color key{(unsigned char)INT(1), (unsigned char)INT(2), (unsigned char)INT(3), 255};
      ::Font font = ::LoadFontFromImage(rlreg::images.at(INT(0)), key, INT(4));
      int id = rlreg::next_font_id++;
      rlreg::fonts[id] = font;
      return Value::from_int(id);

  - name: LOADFONTFROMMEMORY
    raylib_name: LoadFontFromMemory
    args: [string, string, int, int]
    ret: font
    category: fonts
    description: "Load font from memory buffer (fileType, data, dataSize, fontSize)"
    custom_body: |
      // Load font without custom codepoints (uses default)
      ::Font font = ::LoadFontFromMemory(STR(0).c_str(), (const unsigned char*)STR(1).c_str(), INT(2), INT(3), nullptr, 0);
      int id = rlreg::next_font_id++;
      rlreg::fonts[id] = font;
      return Value::from_int(id);

  - name: ISFONTVALID
    raylib_name: IsFontValid
    args: [int]
    ret: bool
    category: fonts
    description: "Check if font is valid (pass font ID)"
    custom_body: |
      return Value::from_bool(::IsFontValid(rlreg::fonts.at(INT(0))));

  - name: EXPORTFONTASCODE
    raylib_name: ExportFontAsCode
    args: [int, string]
    ret: bool
    category: fonts
    description: "Export font as code file (pass font ID, fileName)"
    custom_body: |
      return Value::from_bool(::ExportFontAsCode(rlreg::fonts.at(INT(0)), STR(1).c_str()));

  # === TEXT DRAWING ===
  - name: DRAWTEXTCODEPOINTS
    raylib_name: DrawTextCodepoints
    args: [int, string, float, float, float, float, int, int, int]
    ret: void
    category: fonts
    description: "Draw multiple character (codepoint) (pass font ID, codepoints as comma-separated string, posX, posY, fontSize, spacing, R, G, B)"
    custom_body: |
      // Parse codepoints from comma-separated string "cp1,cp2,cp3,..."
      std::string codepointStr = STR(1);
      std::vector<int> codepoints;
      size_t start = 0;
      size_t pos = 0;
      while ((pos = codepointStr.find(',', start)) != std::string::npos) {
        codepoints.push_back(std::stoi(codepointStr.substr(start, pos - start)));
        start = pos + 1;
      }
      if (start < codepointStr.length()) {
        codepoints.push_back(std::stoi(codepointStr.substr(start)));
      }
      ::Vector2 position{(float)FLOAT(2), (float)FLOAT(3)};
      ::Color color{(unsigned char)INT(6), (unsigned char)INT(7), (unsigned char)INT(8), 255};
      ::DrawTextCodepoints(rlreg::fonts.at(INT(0)), codepoints.data(), codepoints.size(), position, (float)FLOAT(4), (float)FLOAT(5), color);

  # === TEXT FONT INFO ===
  - name: SETTEXTLINESPACING
